version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creatosconnect-backend
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    env_file:
      - .env
    volumes:
      # Mount storage directory to persist user data
      - ./storage:/app/storage
      # Mount data files
      - ./data:/app/data
      - ./influencer_master_data.csv:/app/influencer_master_data.csv
      - ./influencer_master_data.xlsx:/app/influencer_master_data.xlsx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - creatosconnect

networks:
  creatosconnect:
    driver: bridge
